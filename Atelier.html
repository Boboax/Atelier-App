:root{
  --paper:#f6f3ec; --card:#fffdf8; --ink:#23201b; --muted:#6e6759;
  --hair:#e4ddcf; --line:#d9d1c0; --accent:#b4532a; --accent-soft:#e8d3c6;
  --good:#4e8a5b; --warn:#b9892f; --bad:#b4453a;
  --navbg:rgba(255,253,248,.94); --sheetbg:rgba(255,253,248,.96);
  --shadow:0 1px 2px rgba(40,34,24,.06), 0 6px 18px rgba(40,34,24,.06);
  --r:14px; --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
/* evening practice: dark chrome, same terracotta; the drawing canvas itself
   stays paper-white (ink drawings and Bargue plates are dark-on-white) */
@media (prefers-color-scheme: dark){
  :root{
    --paper:#211d18; --card:#2b2620; --ink:#ece5d8; --muted:#a49a8b;
    --hair:#3a342b; --line:#463f33; --accent:#d1744b; --accent-soft:#4a3227;
    --good:#7fb58b; --warn:#d0a955; --bad:#d0685c;
    --navbg:rgba(33,29,24,.94); --sheetbg:rgba(43,38,32,.96);
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--paper); color:var(--ink); font-family:var(--sans);
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  overscroll-behavior:none;
  font-size:16px; line-height:1.45;
  padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
}
/* motion is decorative here — honor the system setting */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:.2px;margin:0}
.muted{color:var(--muted)} .small{font-size:13px} .tiny{font-size:11px}
button{font-family:inherit;touch-action:manipulation}

/* ---- app shell --------------------------------------------------------- */
#app{min-height:100%;display:flex;flex-direction:column;max-width:920px;margin:0 auto}
@media (min-width:1000px){#app{max-width:1080px}}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:18px calc(20px + env(safe-area-inset-right)) 6px calc(20px + env(safe-area-inset-left))}
.topbar h1{font-size:26px}
.brandmark{font-family:var(--serif);font-size:22px;letter-spacing:.5px;cursor:pointer;user-select:none}
.profilechip{background:var(--accent-soft);color:var(--accent);border:0;border-radius:30px;
  padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.brandmark .dot{color:var(--accent)}
.view{flex:1;padding:8px calc(20px + env(safe-area-inset-right)) 96px calc(20px + env(safe-area-inset-left));animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---- bottom nav -------------------------------------------------------- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--navbg);
  backdrop-filter:blur(8px);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:6px calc(4px + env(safe-area-inset-right)) env(safe-area-inset-bottom) calc(4px + env(safe-area-inset-left))}
.nav button{background:none;border:0;color:var(--muted);font-size:11px;display:flex;
  flex-direction:column;align-items:center;gap:2px;padding:8px 14px;border-radius:10px;cursor:pointer;
  transition:color .15s ease,transform .12s ease}
.nav button .ic{line-height:1;display:block}
.nav button .ic svg{width:22px;height:22px;display:block}
.nav button.active{color:var(--accent)}
.nav button:active{transform:scale(.94)}

/* ---- cards & layout ---------------------------------------------------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card h2{font-size:18px;margin-bottom:8px}
.card.rec{border:1.5px solid var(--accent);background:linear-gradient(var(--card),var(--accent-soft))}
.card.rec.slim{padding:10px 12px}
.card.rec.slim .rec-tag{margin-right:4px}
.rec-tag{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--accent)}
.row{display:flex;gap:12px}.row.wrap{flex-wrap:wrap}.between{justify-content:space-between}
.center{align-items:center}
.grid{display:grid;gap:12px}
.grid.two{grid-template-columns:1fr 1fr}
@media(min-width:560px){.grid.cards{grid-template-columns:1fr 1fr}}
.stack>*+*{margin-top:10px}

/* ---- buttons ----------------------------------------------------------- */
.btn,.chip,.estq button,.ratebtns button,.stepper button{
  transition:transform .12s ease,background-color .15s ease,opacity .15s ease,border-color .15s ease}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#fff;border:0;border-radius:12px;
  padding:14px 22px;font-size:16px;font-weight:600;cursor:pointer;min-height:48px}
.btn:active{transform:translateY(1px) scale(.98)}
.btn.block{width:100%}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.soft{background:var(--accent-soft);color:var(--accent)}
.btn.sm{padding:9px 14px;font-size:14px;min-height:40px}
.btn:disabled{opacity:.4;cursor:default}
.btn.ghost:active,.chip:active,.estq button:active,.ratebtns button:active,.stepper button:active{background:var(--hair)}
/* in-modal text input (replaces native prompt()) */
.txtinput{width:100%;margin-top:10px;padding:12px 14px;font-size:16px;font-family:var(--sans);
  color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;
  -webkit-user-select:text;user-select:text}
.txtinput:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}

/* ---- home -------------------------------------------------------------- */
.streak-hero{display:flex;align-items:center;gap:18px}
.ring{position:relative;width:84px;height:84px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .num b{font-size:22px;font-family:var(--serif)}
.flame{font-size:30px}
.module{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--hair)}
.module:last-child{border-bottom:0}
.lvlpill{background:var(--accent-soft);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600}
.exrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--hair);cursor:pointer}
.exrow:last-child{border-bottom:0}
.exrow .meta{flex:1}.exrow .meta .nm{font-weight:600}
.tag{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--muted)}
.tag.self{border-color:var(--accent-soft);color:var(--accent)}

/* ---- rank + achievements ----------------------------------------------- */
.accbar{position:relative;height:6px;border-radius:4px;background:var(--hair);max-width:240px;margin-top:2px}
.accfill{height:100%;border-radius:4px;transition:width .3s ease}
.accmark{position:absolute;top:-2px;left:85%;width:2px;height:10px;background:var(--ink);opacity:.45}
.rankbar{height:8px;border-radius:6px;background:var(--hair);margin-top:10px;overflow:hidden}
.rankfill{height:100%;background:var(--accent);border-radius:6px;transition:width .4s ease}
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px;margin-top:10px}
.badge{text-align:center;padding:10px 4px;border:1px solid var(--line);border-radius:12px;background:var(--card)}
.badge .bic{font-size:22px;line-height:1.2}
.badge .bnm{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.2}
.badge.locked{opacity:.32;filter:grayscale(1)}
.mapwrap{margin-top:12px;position:relative;padding-left:20px}
.mapwrap:before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:var(--hair)}
.mapnode{position:relative;padding:9px 0;cursor:pointer;border-bottom:1px solid var(--hair)}
.mapnode:last-child{border-bottom:0}
.mapnode:before{content:'';position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--card)}
.mapnode .mn-name{font-weight:600}
.mapnode .mn-stars{font-size:14px;margin-top:2px;letter-spacing:1px}

/* ---- today's plan ------------------------------------------------------- */
.planrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--hair)}
.planrow:last-of-type{border-bottom:0}
.planrow .pcheck{width:30px;height:30px;flex:none;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--muted)}
.planrow.done .pcheck{background:var(--good);border-color:var(--good);color:#fff}
.planrow.done .nm{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--hair)}
.planrow .meta{flex:1}
.planrow .nm{font-weight:600}
.pdots{display:flex;gap:5px;align-items:center}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--hair);display:inline-block}
.pdot.met{background:var(--accent)}
.pdot.today{outline:2px solid var(--accent);outline-offset:1px}

/* ---- then vs now -------------------------------------------------------- */
.cmpgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 8px}

/* ---- teaching card ------------------------------------------------------ */
.learncard{text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-top:6px}
.learncard .lc-head{font-family:var(--serif);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.learncard .lc-ic{color:var(--accent);font-size:17px}
.learncard .lc-why{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.5}
.learncard .lc-how{font-size:13px;line-height:1.5}

/* ---- calendar strip ---------------------------------------------------- */
.cal{display:grid;grid-template-columns:repeat(14,1fr);gap:6px}
.cal .d{aspect-ratio:1;border-radius:8px;background:var(--hair);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.cal .d.met{background:var(--accent);color:#fff}
.cal .d.today{outline:2px solid var(--accent)}

/* ---- drill (full screen) ---------------------------------------------- */
#drill{position:fixed;inset:0;z-index:50;background:var(--paper);display:none;flex-direction:column}
#drill.on{display:flex}

/* Landscape (iPad Pro etc.): canvas on the left, a side rail on the right for
   instructor + controls + reveal — bigger square box, nothing over the canvas. */
@media (orientation:landscape) and (min-width:900px){
  #drill.on{display:grid;grid-template-columns:1fr 360px;grid-template-rows:auto auto 1fr auto}
  #drill.on canvas{position:static;grid-column:1;grid-row:1 / 5;width:100%;height:100%;border-right:1px solid var(--line)}
  #drill.on .instructor{position:static;grid-column:2;grid-row:1;background:none;
    flex-direction:column;align-items:flex-start;gap:6px;padding:22px 100px 8px 20px}  /* right pad clears ✕/? */
  #drill.on .instructor .txt{font-size:17px}
  #drill.on .hint{position:static;grid-column:2;grid-row:2;left:auto;right:auto;top:auto;padding:0 20px 4px}
  #drill.on #d-result{grid-column:2;grid-row:3;display:flex;align-items:center;justify-content:center;padding:0 16px;overflow:auto}
  #drill.on .controls{position:static;grid-column:2;grid-row:4;background:none;
    flex-direction:column;align-items:stretch;gap:8px;padding:8px 20px 24px}
  #drill.on .controls .btn{width:100%}
  #drill.on .resultcard{position:static;transform:none;bottom:auto;width:100%;
    background:var(--card);box-shadow:none;border:1px solid var(--line)}
}
#drill .instructor{position:absolute;top:0;left:0;right:0;z-index:5;
  padding:calc(env(safe-area-inset-top) + 12px) 102px 10px 16px;   /* clear the ✕ and ? corner buttons */
  background:linear-gradient(#fff,rgba(255,255,255,.0));
  display:flex;align-items:center;justify-content:space-between;gap:10px}
#drill .instructor .txt{font-family:var(--serif);font-size:16px}
#drill .timer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--accent);font-size:18px}
.hgroup{display:flex;align-items:center;gap:10px;flex:none}
/* hint line under the instructor (e.g. "memory fades — commit"); kept clear of the buttons */
#drill .hint{position:absolute;left:16px;right:102px;z-index:5;
  top:calc(env(safe-area-inset-top) + 46px);
  font-size:12.5px;font-weight:600;color:var(--warn);pointer-events:none}
/* radial countdown / elapsed ring with the number in the centre (drill header) */
.tring{position:relative;width:48px;height:48px;flex:none}
.tring svg{width:48px;height:48px;display:block;transform:rotate(-90deg)}
.tring circle{fill:none;stroke-width:4;stroke-linecap:round}
.tring .track{stroke:var(--line)}
.tring .fill{stroke:var(--accent);transition:stroke-dashoffset .18s linear,stroke .2s}
.tring.warn .fill{stroke:var(--warn)}
.tringtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;color:var(--accent)}
.tring.warn .tringtxt{color:var(--warn)}
.tring.warn .fill{animation:ringpulse 1.1s ease-in-out infinite}
@keyframes ringpulse{0%,100%{opacity:1}50%{opacity:.45}}
.ringwrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex:none}
.ringlabel{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:600}
.tring.warn + .ringlabel{color:var(--warn)}
#drill canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
#drill .controls{position:absolute;left:0;right:0;bottom:0;z-index:5;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 14px);
  display:flex;gap:10px;justify-content:center;align-items:center;
  background:linear-gradient(rgba(255,255,255,0),#fff 40%)}
#drill .controls .btn{box-shadow:var(--shadow)}
.closeX{position:absolute;top:calc(env(safe-area-inset-top) + 8px);right:10px;z-index:6;
  background:rgba(0,0,0,.05);border:0;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;color:var(--ink)}
@media (prefers-color-scheme: dark){.closeX{background:rgba(255,255,255,.08)}}
.scorebadge{font-family:var(--serif);font-size:54px;font-weight:700;line-height:1}
.scorebadge.s-good{color:var(--good)}.scorebadge.s-mid{color:var(--warn)}.scorebadge.s-low{color:var(--bad)}
/* the reveal is the emotional peak of the loop — let it land */
@keyframes scorein{from{opacity:0;transform:scale(.6)}60%{transform:scale(1.06)}to{opacity:1;transform:scale(1)}}
@keyframes cardin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.resultcard{position:absolute;left:50%;bottom:92px;top:auto;transform:translateX(-50%);z-index:6;
  width:min(380px,90vw);text-align:center;padding:14px;
  background:var(--sheetbg);backdrop-filter:blur(4px);box-shadow:var(--shadow);
  animation:cardin .3s cubic-bezier(.32,1.2,.6,1)}
.resultcard .scorebadge{font-size:42px;display:inline-block;
  animation:scorein .45s .08s cubic-bezier(.34,1.4,.64,1) backwards}
.resultcard .scorebadge.s-good{text-shadow:0 0 22px color-mix(in srgb, var(--good) 45%, transparent)}
/* the landscape rail repositions the card — its entrance must not re-translate */
@media (orientation:landscape) and (min-width:900px){
  #drill.on .resultcard{animation-name:scorein}
}
.estq{display:flex;gap:6px}
.estq button{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--line);
  background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--ink)}
.estq button.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.metricline{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--hair);font-size:14px}
.metricline:last-child{border-bottom:0}
.opacityctl{display:flex;align-items:center;gap:10px;width:min(360px,86vw)}
input[type=range]{flex:1;accent-color:var(--accent);min-height:44px}
.ratebtns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.ratebtns button{width:46px;height:46px;border-radius:12px;border:1px solid var(--line);
  background:var(--card);font-size:16px;font-weight:700;cursor:pointer}
.ratebtns button.sel{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ---- perception overlay ------------------------------------------------ */
#perceive{position:fixed;inset:0;z-index:50;background:var(--paper);display:none;flex-direction:column;align-items:center;justify-content:flex-start}
#perceive.on{display:flex}
#perceive .instructor{position:absolute;top:0;left:0;right:0;
  padding:calc(env(safe-area-inset-top) + 12px) 58px 10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
#perceive .instructor .txt{font-family:var(--serif);font-size:16px}
/* top-anchored so the stimulus keeps a fixed position; the result grows downward
   below it instead of shoving it around when the screen is vertically centred. */
#perceive .p-stage{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;
  padding:calc(env(safe-area-inset-top) + 84px) 20px 24px}
#perceive #p-ctrl{width:min(360px,82vw);min-height:150px}

/* ---- charts ------------------------------------------------------------ */
.chart{width:100%;height:auto;display:block}
.chart .ctick{fill:var(--muted);font-size:9px;font-family:var(--sans)}
.chart .blabel{fill:var(--ink);font-size:12px;font-family:var(--sans)}
.chart .bval{fill:var(--muted);font-size:11px;font-family:var(--sans);text-anchor:end}
.chart .jlabel{fill:var(--muted);font-size:9px;font-family:var(--sans)}
.chart .jlabel.cur{fill:var(--accent);font-weight:700}
.statbig{font-family:var(--serif);font-size:34px}
.kpi{display:flex;gap:18px;flex-wrap:wrap}
.kpi .k{flex:1;min-width:90px}
.kpi .k .v{font-family:var(--serif);font-size:26px}
.kpi .k .l{font-size:12px;color:var(--muted)}
.insight{background:var(--accent-soft);border-radius:10px;padding:10px 12px;font-size:14px;margin-top:8px}

/* ---- gallery / library ------------------------------------------------- */
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.gal .cell{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer}
.gal .cell .thumb,.gal .cell svg{width:100%;display:block;background:#fff}
.gal .cell .cap{padding:5px 7px;font-size:11px;display:flex;justify-content:space-between}
.gal .cell .sc{font-weight:700}
.gal .cell .sc.s-good{color:var(--good)}.gal .cell .sc.s-mid{color:var(--warn)}.gal .cell .sc.s-low{color:var(--bad)}
.libgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.libcell{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;position:relative}
.libcell img{width:100%;height:120px;object-fit:cover;display:block;background:#eee}
.libcell .cap{padding:6px 8px;font-size:12px}
.libcell .del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border:0;border-radius:50%;width:32px;height:32px;cursor:pointer}
.libcell .del::after{content:'';position:absolute;inset:-8px}   /* 48px hit area for a destructive tap */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* ---- settings ---------------------------------------------------------- */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--hair)}
.setrow:last-child{border-bottom:0}
.switch{width:50px;height:30px;border-radius:30px;background:var(--line);position:relative;cursor:pointer;flex:none;transition:.15s}
.switch.on{background:var(--accent)}
.switch .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.15s}
.switch.on .knob{left:23px}
.stepper{display:flex;align-items:center;gap:12px}
.stepper button{width:44px;height:44px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:20px;cursor:pointer;color:var(--ink)}

/* ---- modal ------------------------------------------------------------- */
@keyframes backdropin{from{opacity:0}}
@keyframes sheetin{from{opacity:0;transform:translateY(14px) scale(.98)}}
.modal{position:fixed;inset:0;z-index:60;background:rgba(30,26,20,.5);display:flex;
  align-items:center;justify-content:center;padding:20px;animation:backdropin .2s ease}
.modal.top{align-items:flex-start;padding-top:8vh}   /* input sheets: keep clear of the keyboard */
.modal .sheet{background:var(--card);border-radius:var(--r);max-width:460px;width:100%;
  max-height:86dvh;overflow:auto;padding:18px;box-shadow:var(--shadow);
  animation:sheetin .25s cubic-bezier(.32,1.2,.6,1)}
.replaycv{width:100%;aspect-ratio:1;background:#fff;border:1px solid var(--line);border-radius:10px}

.banner{background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:12px}

/* ===== js/geometry.js ===== */
/* ============================================================================
   geometry.js  —  the scoring engine
   ----------------------------------------------------------------------------
   Because every *generated* drill knows its own ground-truth target, we can
   score a memory drawing objectively:
     - lines:  signed angle error (deg) + signed length error (%)
     - shapes: size/position-invariant overlap (IoU) + aspect (proportion) error
   Signed errors feed the calibration charts (systematic bias).
   No DOM dependencies except an offscreen <canvas> for rasterising shapes.
   Exposed as window.A.geom
   ========================================================================== */
(function (A) {
  'use strict';
  const geom = {};

  const TAU = Math.PI * 2;
  const toDeg = (r) => r * 180 / Math.PI;

  geom.dist = (a, b) => Math.hypot(a[0] - b[0], a[1] - b[1]);

  // Total arc length of a polyline.
  geom.pathLength = function (pts) {
    let L = 0;
    for (let i = 1; i < pts.length; i++) L += geom.dist(pts[i - 1], pts[i]);
    return L;
  };

  // Resample a polyline to exactly n points, evenly spaced by arc length.
  geom.resample = function (pts, n) {
    if (pts.length < 2) return pts.slice();
    const total = geom.pathLength(pts);
    if (total === 0) return Array.from({ length: n }, () => pts[0].slice());
    const step = total / (n - 1);
    const out = [pts[0].slice()];
    let prev = pts[0], acc = 0, i = 1;
    let target = step;
    while (out.length < n - 1 && i < pts.length) {
      const seg = geom.dist(prev, pts[i]);
      if (acc + seg >= target) {
        const t = (target - acc) / seg;
        const np = [prev[0] + (pts[i][0] - prev[0]) * t,
                    prev[1] + (pts[i][1] - prev[1]) * t];
        out.push(np);
        prev = np; acc = 0; target = step;
      } else {
        acc += seg; prev = pts[i]; i++;
      }
    }
    out.push(pts[pts.length - 1].slice());
    return out;
  };

  // Smallest signed difference a-b mapped to (-180,180].
  function angDiff(a, b) {
    let d = a - b;
    while (d > 180) d -= 360;
    while (d <= -180) d += 360;
    return d;
  }
  geom.angDiff = angDiff;

  // Diagonal of a point set's bounding box — used to reject degenerate input
  // (an accidental tap or a hairline scribble must score 0, not ride the
  // normalisation fallback up to a half-decent score).
  const MIN_EXTENT = 0.02;                 // in design units ([0,1] box)
  function extentOf(pts) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of pts) {
      if (p[0] < minX) minX = p[0]; if (p[0] > maxX) maxX = p[0];
      if (p[1] < minY) minY = p[1]; if (p[1] > maxY) maxY = p[1];
    }
    return Math.hypot(maxX - minX, maxY - minY);
  }
  geom.extentOf = extentOf;

  // Ramer–Douglas–Peucker polyline simplification (keeps [x,y,...] tuples).
  // Used to decimate coalesced Pencil strokes before storing/replaying them —
  // visually identical, an order of magnitude fewer points.
  geom.rdp = function (pts, eps) {
    if (!pts || pts.length < 3) return pts ? pts.slice() : [];
    eps = eps == null ? 0.002 : eps;
    const keep = new Uint8Array(pts.length);
    keep[0] = keep[pts.length - 1] = 1;
    const stack = [[0, pts.length - 1]];
    while (stack.length) {
      const seg = stack.pop(), i0 = seg[0], i1 = seg[1];
      const a = pts[i0], b = pts[i1];
      const dx = b[0] - a[0], dy = b[1] - a[1];
      const L2 = dx * dx + dy * dy;
      let worst = -1, wd = 0;
      for (let i = i0 + 1; i < i1; i++) {
        const p = pts[i];
        let d;
        if (L2 === 0) d = Math.hypot(p[0] - a[0], p[1] - a[1]);
        else {
          const t = Math.max(0, Math.min(1, ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / L2));
          d = Math.hypot(p[0] - (a[0] + t * dx), p[1] - (a[1] + t * dy));
        }
        if (d > wd) { wd = d; worst = i; }
      }
      if (wd > eps && worst > 0) { keep[worst] = 1; stack.push([i0, worst], [worst, i1]); }
    }
    const out = [];
    for (let i = 0; i < pts.length; i++) if (keep[i]) out.push(pts[i]);
    return out;
  };

  /* ---- LINE scoring -------------------------------------------------------
     target / user are 2-point segments [[x1,y1],[x2,y2]] (user = stroke ends).
     Orientation is undirected (a line and its 180° flip are the same line),
     so we fold the signed angle error into (-90,90].                         */
  geom.scoreLine = function (target, userPts) {
    if (!userPts || userPts.length < 2 || extentOf(userPts) < MIN_EXTENT) {
      return { score: 0, angleErr: 0, lengthErrPct: -100, angleScore: 0, lengthScore: 0,
               metrics: { degenerate: true } };
    }
    const u0 = userPts[0], u1 = userPts[userPts.length - 1];
    const tAng = toDeg(Math.atan2(target[1][1] - target[0][1], target[1][0] - target[0][0]));
    const uAng = toDeg(Math.atan2(u1[1] - u0[1], u1[0] - u0[0]));
    let aErr = angDiff(uAng, tAng);          // signed, (-180,180]
    if (aErr > 90) aErr -= 180;              // fold (undirected line)
    if (aErr <= -90) aErr += 180;
    const tLen = geom.dist(target[0], target[1]);
    const uLen = geom.dist(u0, u1);
    const lenErrPct = tLen ? (uLen - tLen) / tLen * 100 : 0;

    const angleScore = Math.max(0, 100 - Math.abs(aErr) * 3);     // 33° off → 0
    const lengthScore = Math.max(0, 100 - Math.abs(lenErrPct) * 1.2); // 83% off → 0
    const score = Math.round(angleScore * 0.6 + lengthScore * 0.4);

/* ===== js/library.js ===== */
/* ============================================================================
   library.js  —  reference image library (bundled + user imports)
   ----------------------------------------------------------------------------
   Bundled plates/worksheets live in window.ATELIER_REFS (base64, offline).
   Imported images are downscaled on the device and stored in IndexedDB.
   Exposed as window.A.library
   ========================================================================== */
(function (A) {
  'use strict';
  const CATS = {
    lines: 'Straight lines', polygons: 'Polygons', envelopes: 'Organic shapes',
    bargue: 'Bargue plates', user: 'My references'
  };
  let _items = [];
  const _imgCache = {};

  function makeItem(r, bundled) {
    return { id: r.id, title: r.title, category: r.category || 'user',
             group: r.group || (bundled ? 'Bundled' : 'Imported'),
             src: r.src, w: r.w, h: r.h, bundled: !!bundled, attrib: r.attrib || '' };
  }

  const library = {
    CATS,
    async init() {
      _items = [];
      const bundled = (window.ATELIER_REFS || []).map((r) => makeItem(r, true));
      let user = [];
      try { user = (await A.store.allUserRefs()).map((r) => makeItem(r, false)); } catch (e) {}
      _items = bundled.concat(user);
      return _items;
    },
    all() { return _items; },
    byCategory(cat) {
      if (!cat || cat === 'any' || cat === 'all') return _items;
      return _items.filter((i) => i.category === cat);
    },
    get(id) { return _items.find((i) => i.id === id); },

    // returns a (cached) loaded HTMLImageElement
    image(item) {
      if (!item) return Promise.resolve(null);
      if (_imgCache[item.id]) return Promise.resolve(_imgCache[item.id]);
      return new Promise((res) => {
        const im = new Image();
        im.onload = () => { _imgCache[item.id] = im; res(im); };
        im.onerror = () => res(null);
        im.src = item.src;
      });
    },

    // import a File → downscale → store in IndexedDB → return new item
    async importFile(file, title) {
      const dataUrl = await new Promise((res, rej) => {
        const fr = new FileReader();
        fr.onload = () => res(fr.result); fr.onerror = () => rej(fr.error);
        fr.readAsDataURL(file);
      });
      const img = await new Promise((res, rej) => {
        const im = new Image(); im.onload = () => res(im); im.onerror = () => rej(new Error('bad image')); im.src = dataUrl;
      });
      const maxdim = 1500;
      const scale = Math.min(1, maxdim / Math.max(img.naturalWidth, img.naturalHeight));
      const w = Math.round(img.naturalWidth * scale), h = Math.round(img.naturalHeight * scale);
      const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const out = cv.toDataURL('image/jpeg', 0.82);
      const rec = { id: 'user-' + Date.now() + '-' + Math.floor(Math.random() * 1e4),
                    title: title || file.name.replace(/\.[^.]+$/, ''), category: 'user',
                    group: 'My references', src: out, w, h };
      await A.store.addUserRef(rec);
      const item = makeItem(rec, false);
      _items.push(item);
      return item;
    },
    async deleteUser(id) {
      await A.store.deleteUserRef(id);
      _items = _items.filter((i) => i.id !== id);
      delete _imgCache[id];
    }
  };

  A.library = library;
})(window.A = window.A || {});

    if (sv) return { step: 'resume', exKey: '', title: 'Resume ' + (sv.kind === 'warmup' ? 'quick session' : 'mixed session'), sub: sv.completed + '/' + sv.queue.length + ' done today', btn: 'Resume' };
    const btns = { warmup: 'Warm up', mixed: 'Start', resume: 'Resume', reference: 'Try', build: 'Practice', recall: 'Test me' };
    return { step: r.step, exKey: r.exKey || '', title: r.title, sub: r.sub, btn: btns[r.step] || 'Practice' };
  }
  // slim one-line recommendation — used at the top of the Exercises menu
  // (Home surfaces the same engine as the Today's-plan checklist)
  function recLine(all) {
    const a = recAction(all);
    return `<div class="card rec slim"><div class="row between center">
      <div class="small"><span class="rec-tag">RECOMMENDED</span> <b>${esc(a.title)}</b><div class="tiny muted">${esc(a.sub)}</div></div>
      <button class="btn soft sm" data-rec="${a.step}" data-recex="${esc(a.exKey)}">${a.btn} ›</button></div></div>`;
  }
  function doRec(step, exKey) {
    if (step === 'warmup') startWarmup();
    else if (step === 'build' || step === 'reference') startExercise(exKey);
    else if (step === 'recall') startRecall();
    else if (step === 'resume') resumeSession();
    else if (step === 'mixed') { const sv = savedSession(); if (sv && sv.kind === 'mixed') resumeSession(); else startSession('mixed'); }
  }
  // alternate the warm-up between angle and proportion (the app teaches doing
  // both); prefer whichever perception skill is at the lower level
  function startWarmup() {
    const pl = A.store.get('percLevel', { angle: 1, prop: 1 });
    if ((pl.angle || 1) !== (pl.prop || 1)) { A.Perceive.start((pl.angle || 1) <= (pl.prop || 1) ? 'angle' : 'prop'); return; }
    const last = A.store.get('lastWarmKind', 'prop');
    const kind = last === 'angle' ? 'prop' : 'angle';
    A.store.set('lastWarmKind', kind);
    A.Perceive.start(kind);
  }

  // RETENTION CHECK: pull a scored target studied on a previous day (newest days
  // first, random within the day) and serve it cold — no study phase.
  async function startRecall() {
    const all = await attempts();
    const today = A.habit.today();
    const pool = all.filter((a) => a.scored && !a.repeat && !a.recall && a.day && a.day < today && a.target);
    if (!pool.length) { toast('No previous figures to recall yet — practise today, test tomorrow.'); return; }
    const days = Array.from(new Set(pool.map((a) => a.day))).sort().reverse().slice(0, 7);
    const day = days[Math.floor(Math.random() * Math.min(3, days.length))];   // mostly yesterday-ish
    const cand = pool.filter((a) => a.day === day);
    const att = cand[Math.floor(Math.random() * cand.length)];
    run = null; session = null;
    const d = $('#drill'); d.classList.add('on');
    surface.opts.pencilOnly = A.store.get('pencilOnly', false);
    surface.opts.baseWidth = A.store.get('inkWidth', 3.2);
    surface.opts.smooth = A.store.get('smooth', 0.5);
    setTimeout(() => { surface.resize(); drill.startRecall(att.type, att.target); }, 0);
  }

  async function attempts(force) {
    if (!attemptsCache || force) attemptsCache = await A.store.allAttempts();
    return attemptsCache;
  }
  function invalidate() { attemptsCache = null; }
  ui.invalidate = invalidate;   // other modules (perceive) record attempts too
  ui.doRec = (step, exKey) => doRec(step, exKey);   // lets perceive chain into the next step

  /* ---- profiles (multi-user on one iPad) --------------------------------- */
  function refreshProfileChip() {
    const b = $('#profilebtn'); if (!b) return;
    let n = A.store.profileName() || 'Player 1';
    if (n.length > 12) n = n.slice(0, 11) + '…';
    b.textContent = '👤 ' + n;
  }
  function switchProfile(pid) {
    A.store.setProfile(pid);
    invalidate();
    refreshProfileChip();
    ui.go(ui.view);          // re-render the current view with the new profile's data
  }
  function openProfiles() {
    const cur = A.store.profileId();
    const rows = A.store.profiles().map((p) =>
      `<button class="btn ${p.id === cur ? '' : 'ghost'} block" data-switch="${esc(p.id)}" style="margin-top:6px">${p.id === cur ? '● ' : ''}${esc(p.name)}</button>`).join('');
    const sheet = openModal(`<h2>Who’s practising?</h2>
      <p class="small muted">Each person keeps their own levels, streak, stats and history on this iPad.</p>
      ${rows}
      <button class="btn soft block" data-adduser="1" style="margin-top:10px">+ Add user</button>
      <button class="btn ghost block" data-go="settings" style="margin-top:6px">Manage users in Settings ›</button>`);
    // bind pointerup AND click (de-duped) — iOS can suppress the synthetic click on
    // freshly-shown overlays, which made these taps do nothing
    let done = false;
    const act = (e) => {
      const sw = e.target.closest('[data-switch]'), add = e.target.closest('[data-adduser]'), go = e.target.closest('[data-go]');
      if (!(sw || add || go) || done) return;

      else if (go) { closeModal(); ui.go('settings'); }
    };
    sheet.addEventListener('pointerup', act);
    sheet.addEventListener('click', act);
  }

  function toast(msg) {
    let t = $('.toast'); if (!t) { t = el('<div class="toast"></div>'); document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1900);
  }

  /* ======================================================================

     ====================================================================== */
  // Monday-aligned week index of a 'YYYY-MM-DD' key (for the weekly report ritual)
  function weekIdxOf(day) { const p = day.split('-'); return Math.floor((Date.UTC(+p[0], +p[1] - 1, +p[2]) / 864e5 - 4) / 7); }

  async function renderHome(v) {
    const allAtts = await attempts();
    A.game.noteStreak();
    const rk = A.game.rank();

      </div></div>`;

    // ---- progression snapshot: the drill nearest promotion + compact levels ----
    const scored = A.curr.EXERCISES.filter((e) => e.scored);
    const snap = scored.map((e) => {
      const win = A.curr.window(e.key);
      const scores = win.map((w) => (typeof w === 'object' && w ? w.s : w));

      return { e, lvl: A.curr.level(e.key), recent };

    const focus = snap.filter((s) => s.recent != null && s.lvl < (s.e.maxLevel || 9))
                      .sort((a, b) => b.recent - a.recent)[0] || snap[0];

      <div class="exrow" data-focus="${focus.e.key}"><div class="meta">

        <div class="accbar"><div class="accfill" style="width:${focus.recent == null ? 0 : Math.min(100, focus.recent)}%;background:${meeting ? 'var(--good)' : 'var(--accent)'}"></div><div class="accmark"></div></div>

    // ---- how-to: novices only; afterwards the plan card carries the method ----
    const howto = rk.index === 0 ? `<div class="card">
        <h2>How to progress</h2>
        <ol class="small muted" style="margin:8px 0 0;padding-left:20px;line-height:1.7">
          <li><b>Warm up the eye</b> (2–3 min): judge angles &amp; proportions — no drawing.</li>
          <li><b>Build accuracy</b>: Lines &amp; Angles → Curves → Polygons → Envelopes. Hold ~85% across a couple of days and the level rises on its own.</li>
          <li><b>Lock it in</b>: the daily retention check + a Mixed Session a few times a week.</li>

    v.innerHTML = `

    v.onclick = (e) => {

  // rank-up: a once-a-month event deserves more than a toast — the journey
  // curve with the marker on its new node, plus proof of progress if we have it
  function showRankUp(rk, allAtts) {
    const desc = ['finding your eye', 'lines & angles', 'shapes & proportion', 'real subjects & plates', 'drawing from memory'][rk.index] || '';
    const cmp = ['line', 'polygon', 'envelope', 'angles', 'curve'].map((t) => A.history.compare(allAtts, t)).find(Boolean);
    const proof = cmp ? `<div class="insight" style="text-align:left">Proof it’s working: your ${esc(exName(cmp.type))} mean went ${cmp.early.mean} → ${cmp.late.mean} over ${cmp.spanDays} days.</div>` : '';

  // weekly report card: once, on the first Home visit of a new week
  function maybeWeeklyReport(allAtts) {
    const wk = weekIdxOf(A.habit.today());
    const seen = A.store.get('weekSeen', null);
    if (seen === wk) return false;
    A.store.set('weekSeen', wk);
    if (seen == null) return false;                      // first ever visit — nothing to report
    const wr = A.game.weeklyRecap(allAtts);
    if (!wr || wr.drills < 5) return false;              // too little practice to be worth a ritual
    const sa = A.stats.selfAwareness(allAtts);
    const calLine = sa && sa.bias != null ? A.coach.calibration(sa.bias) : '';
    const lb = A.stats.bias(allAtts, 'line');
    const biasLine = lb && lb.n >= 5 ? `Line angle bias is ${lb.angle.mean > 0 ? '+' : ''}${lb.angle.mean}° right now.` : '';
    const recalls = allAtts.filter((a) => a.recall && Date.now() - a.ts < 7 * 864e5);
    const recallLine = recalls.length ? `Best retention check: ${Math.max.apply(null, recalls.map((a) => a.score))}.` : '';
    const sheet = openModal(`<h2>Your week</h2>
      <div class="kpi" style="margin:12px 0">
        <div class="k"><div class="v">${wr.days}</div><div class="l">days</div></div>
        <div class="k"><div class="v">${wr.drills}</div><div class="l">drills</div></div>
        <div class="k"><div class="v">${wr.mean}</div><div class="l">avg acc</div></div>
        ${wr.delta != null ? `<div class="k"><div class="v">${wr.delta > 0 ? '▲' : wr.delta < 0 ? '▼' : '–'}${Math.abs(wr.delta)}</div><div class="l">vs last wk</div></div>` : ''}
      </div>

      ${calLine ? `<div class="insight" style="text-align:left">${esc(calLine)}</div>` : ''}
      <button class="btn block" data-done="1" style="margin-top:12px">Start the week</button>`);
    sheet.addEventListener('click', (e) => { if (e.target.closest('[data-done]')) closeModal(); });
    return true;
  }

      <p class="small muted" style="margin:4px 0 10px"><b>When:</b> at the <b>start of every session</b> (and again if you come back hours later). No drawing — you just judge angles and proportions to prime your eye, because misperceiving the subject (not the hand) is the main cause of inaccurate drawing. Do <b>Judge angle</b> before Lines &amp; Angles, <b>Judge proportion</b> before Polygons &amp; Envelopes. Both level up on their own.</p>
      <div class="row wrap"><button class="btn soft" data-perc="angle">Judge angle · Lv ${A.store.get('percLevel', { angle: 1 }).angle || 1}</button>

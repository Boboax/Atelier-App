name: ci
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Unit tests (curriculum, gamify, geometry, storage)
        run: node --test test/*.test.js
      - name: Build (deterministic stamp; also catches load-order drift)
        run: BUILD=ci node build/build.js
